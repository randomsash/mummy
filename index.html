<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe & Happy 💙</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI', sans-serif;

    background: linear-gradient(-45deg,
    #001f3f,
    #003566,
    #00509d,
    #001845);

    background-size:400% 400%;
    animation:bg 10s ease infinite;

    color:white;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:350px;
    padding:30px;
    border-radius:30px;

    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.2);

    text-align:center;

    box-shadow:0 0 40px rgba(0,0,0,0.4);

    animation:fade 1.5s ease;
    z-index:2;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:2.2rem;
    margin-bottom:15px;

    text-shadow:
    0 0 10px #8ecae6,
    0 0 20px #90e0ef;
}

p{
    line-height:1.6;
    margin-top:15px;
    font-size:1rem;
}

img{
    width:240px;
    height:240px;
    object-fit:cover;

    border-radius:20px;

    margin-top:15px;

    border:3px solid rgba(255,255,255,0.3);

    box-shadow:0 0 30px rgba(173,216,230,0.6);
}

.glow{
    animation:glow 1.5s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px white;
    }
    to{
        text-shadow:0 0 25px #90e0ef;
    }
}

button{
    margin-top:20px;
    padding:12px 24px;

    border:none;
    border-radius:15px;

    background:white;
    color:#003566;

    font-weight:bold;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

.floating{
    position:absolute;
    color:white;
    animation:float 6s linear infinite;
    opacity:0.7;
}

@keyframes float{
    0%{
        transform:translateY(100vh) rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- ENVELOPE SCREEN -->

<div id="envelopeScreen">

    <div class="envelope-container"
    onclick="openEnvelope()"
    id="envelopeBox">

        <div class="envelope"></div>

        <div class="flap"></div>

    </div>

    <div class="tapText">
        Tap the envelope 💌
    </div>

</div>

<!-- POPUP -->

<div id="popup">
    ✨ CONGRATULATIONS ✨
</div>

<!-- MAIN WEBSITE -->

<div id="mainContent" style="display:none;">

<div class="card">

    <h1 class="glow">
        WE SURVIVED 😭💙
    </h1>

    <img src="pic1.jpeg" alt="Us">
    <img src="pic2.jpeg" alt="Safe">
    <p>
        The stress is gone.
        The panic is over.
        And now we can finally breathe again 😭✨
        <br><br>

        Through every "YAR" moment,
        I still loved you endlessly 💙
    </p>

    <button onclick="showMessage()">
        Click Me 💌
    </button>

    <p id="hiddenMessage" style="display:none; margin-top:20px;">
        No Mother's Day though 😭
    </p>

</div>

</div>

<script>

function showMessage(){
    document.getElementById("hiddenMessage")
    .style.display = "block";
}

/* ENVELOPE OPEN */

function openEnvelope(){

    document.getElementById("envelopeBox")
    .classList.add("open");

    setTimeout(()=>{

        let popup =
        document.getElementById("popup");

        popup.style.opacity = "1";

        popup.style.transform = "scale(1)";

    },900);

    setTimeout(()=>{

        document.getElementById("envelopeScreen")
        .style.display = "none";

        document.getElementById("popup")
        .style.display = "none";

        document.getElementById("mainContent")
        .style.display = "flex";

    },3000);
}

/* FLOATING ITEMS */

setInterval(() => {

    let item = document.createElement("div");

    item.className = "floating";

    const emojis = ["💙","✨","⭐","🩵"];

    item.innerHTML =
    emojis[Math.floor(Math.random()*emojis.length)];

    item.style.left =
    Math.random()*100 + "vw";

    item.style.fontSize =
    (Math.random()*20 + 15) + "px";

    item.style.animationDuration =
    (Math.random()*3 + 4) + "s";

    document.body.appendChild(item);

    setTimeout(()=>{
        item.remove();
    },7000);

},300);

</script>

</body>
</html>
